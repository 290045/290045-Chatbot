<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>290045's AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; height: 85vh; background: #1e1e1e; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.6); border: 1px solid #333; }
        .chat-header { background: #ff4b4b; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 10px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: #007bff; align-self: flex-end; color: white; }
        .bot-msg { background: #2a2a2a; align-self: flex-start; color: white; border: 1px solid #444; }
        .input-area { display: flex; padding: 12px; background: #151515; gap: 10px; border-top: 1px solid #2a2a2a; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { padding: 12px 20px; background: #ff4b4b; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e04343; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 290045's AI Chatbot</div>
    <div id="chat-box" class="chat-box">
        <div class="msg bot-msg">Hey! I am running on a secure network proxy. Ask me anything!</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Say hello..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // Render User message
    appendMessage(text, "user-msg");
    userInput.value = "";

    // Show temporary typing status
    const typingDiv = appendMessage("Thinking...", "bot-msg");

    try {
        // Send request using a secure CORS proxy router that strips out blocklists
        const proxyUrl = "https://corsproxy.io?";
        const targetUrl = "https://duckduckgo.com";
        
        // Pass payload through standard query structures
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                "q": `Give a direct concise response as an AI chatbot to this question: ${text}`,
                "b": "Search"
            })
        });

        const rawHtml = await response.text();
        
        // Extract the best text summary from DuckDuckGo's result node
        const parser = new DOMParser();
        const doc = parser.parseFromString(rawHtml, 'text/html');
        const snippets = doc.querySelectorAll('.result__snippet');
        
        let aiText = "";
        if(snippets.length > 0) {
            aiText = snippets[0].innerText;
        } else {
            aiText = "Network traffic clear, but couldn't parse text node. Try phrasing your prompt differently.";
        }

        typingDiv.innerText = aiText;
    } catch (error) {
        typingDiv.innerText = "Connection failed. The network firewall is aggressively blocking proxy scripts.";
        console.error(error);
    }
}

function appendMessage(text, className) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `msg ${className}`;
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msgDiv;
}
</script>

</body>
</html>
