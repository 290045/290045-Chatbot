<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>290045's AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; height: 85vh; background: #1e1e1e; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.6); border: 1px solid #333; }
        .chat-header { background: #ff4b4b; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 10px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: #007bff; align-self: flex-end; color: white; }
        .bot-msg { background: #2a2a2a; align-self: flex-start; color: white; border: 1px solid #444; }
        .input-area { display: flex; padding: 12px; background: #151515; gap: 10px; border-top: 1px solid #2a2a2a; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { padding: 12px 20px; background: #ff4b4b; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 290045's AI Chatbot</div>
    <div id="chat-box" class="chat-box">
        <div class="msg bot-msg">Hey there! Connected safely over Cloudflare. Ask me anything!</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Say hello..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// Hardcoded custom Cloudflare Worker link
const WORKER_URL = "https://290045-chatbot.290045.workers.dev"; 

const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // 1. Render User message bubble
    appendMessage(text, "user-msg");
    userInput.value = "";

    // 2. Render temporary thinking status
    const typingDiv = appendMessage("Thinking...", "bot-msg");

    try {
        // 3. Connect to your secure Cloudflare Worker server pipeline
        const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();
        
        // 4. Update thinking status with the true AI reply
        typingDiv.innerText = data.reply || "Error reading model data pipeline.";
        
    } catch (error) {
        typingDiv.innerText = "Connection failed. Check your Cloudflare Worker app URL configuration.";
        console.error(error);
    }
}

function appendMessage(text, className) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `msg ${className}`;
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msgDiv;
}
</script>

</body>
</html>
